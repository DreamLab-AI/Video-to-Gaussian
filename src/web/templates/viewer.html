<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3D Viewer — {{ filename }}</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { lf: { bg: '#0f1117', surface: '#1a1d27', border: '#2a2d3a', accent: '#6366f1', text: '#e2e8f0', muted: '#94a3b8' } } } }
    }
  </script>
  <style>
    model-viewer {
      width: 100%;
      height: calc(100vh - 64px);
      --poster-color: #0f1117;
    }
    model-viewer::part(default-progress-bar) {
      background: #6366f1;
    }
  </style>
</head>
<body class="h-full bg-lf-bg text-lf-text">
  <header class="border-b border-lf-border px-6 py-4 flex items-center justify-between h-16">
    <div class="flex items-center gap-3">
      <a href="/" class="text-lf-muted hover:text-lf-text transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
        </svg>
      </a>
      <h1 class="text-lg font-semibold">3D Scene Viewer</h1>
      <span class="text-xs text-lf-muted bg-lf-surface px-2 py-0.5 rounded">{{ filename }}</span>
    </div>
    <div class="flex items-center gap-3">
      <a href="/download/{{ job_id }}" class="px-4 py-2 bg-lf-surface border border-lf-border text-sm rounded-lg hover:bg-lf-border transition flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        Download ZIP
      </a>
    </div>
  </header>

  <model-viewer
    src="/mesh/{{ job_id }}"
    alt="3D scene reconstruction from {{ filename }}"
    auto-rotate
    camera-controls
    shadow-intensity="1"
    environment-image="neutral"
    exposure="1.2"
    loading="eager"
    reveal="auto"
  >
    <div slot="progress-bar" class="absolute bottom-0 left-0 right-0 h-1 bg-lf-surface">
      <div class="h-full bg-lf-accent transition-all" id="progress"></div>
    </div>
  </model-viewer>

  <script>
    const viewer = document.querySelector('model-viewer');
    viewer.addEventListener('progress', (e) => {
      document.getElementById('progress').style.width = `${e.detail.totalProgress * 100}%`;
    });
  </script>
</body>
</html>
